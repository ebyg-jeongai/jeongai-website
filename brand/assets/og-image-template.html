<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Source+Sans+3:wght@300;400&display=swap');

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0d1117;
    font-family: 'Montserrat', sans-serif;
    color: #ffffff;
    position: relative;
  }

  /* Subtle grid texture */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Accent glow top-right */
  .glow {
    position: absolute;
    top: -120px;
    right: -80px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(99,130,255,0.18) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* Bottom left glow */
  .glow2 {
    position: absolute;
    bottom: -100px;
    left: 60px;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(99,130,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* Left accent bar */
  .accent-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 5px;
    background: linear-gradient(180deg, #6382ff 0%, #3b5bdb 50%, transparent 100%);
  }

  /* Main content layout */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    padding: 0 90px;
    gap: 60px;
  }

  /* Left: text */
  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .division-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #6382ff;
    margin-bottom: 22px;
  }

  .brand-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 80px;
    font-weight: 800;
    line-height: 1;
    color: #ffffff;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }

  .brand-name span {
    color: #6382ff;
  }

  .tagline {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: rgba(255,255,255,0.65);
    line-height: 1.5;
    max-width: 460px;
    margin-bottom: 44px;
  }

  .pills {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .pill {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 16px;
    border: 1px solid rgba(99,130,255,0.4);
    border-radius: 4px;
    color: rgba(255,255,255,0.7);
    background: rgba(99,130,255,0.08);
  }

  /* Right: 정 mark */
  .right {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .jeong-mark {
    width: 220px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .jeong-char {
    font-family: 'Noto Serif KR', 'Noto Serif SC', serif;
    font-size: 160px;
    color: rgba(255,255,255,0.08);
    position: absolute;
    user-select: none;
    line-height: 1;
  }

  /* SVG brushstroke mark */
  .mark-svg {
    width: 200px;
    height: 200px;
    opacity: 0.9;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: rgba(255,255,255,0.04);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    padding: 0 90px;
    justify-content: space-between;
  }

  .bottom-url {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: rgba(255,255,255,0.35);
  }

  .bottom-url span {
    color: rgba(99,130,255,0.7);
  }

  .bottom-tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="left">
      <div class="division-label">A Division of EBYG Media LLC</div>
      <div class="brand-name">Jeong<span>AI</span></div>
      <div class="tagline">Custom software, AI agents, and automated workflows built precisely around how your business works.</div>
      <div class="pills">
        <div class="pill">AI Agents</div>
        <div class="pill">Custom Software</div>
        <div class="pill">Automation</div>
      </div>
    </div>
    <div class="right">
      <div class="jeong-mark">
        <div class="jeong-char">정</div>
        <!-- Brushstroke mark SVG inline -->
        <svg class="mark-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer ring -->
          <circle cx="100" cy="100" r="90" stroke="rgba(99,130,255,0.25)" stroke-width="1"/>
          <!-- Inner glow ring -->
          <circle cx="100" cy="100" r="75" stroke="rgba(99,130,255,0.15)" stroke-width="0.5"/>
          <!-- 정 character large, centered -->
          <text x="100" y="130" text-anchor="middle" font-family="serif" font-size="100" fill="white" opacity="0.9">정</text>
        </svg>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-url"><span>www.</span>jeongai.com</div>
    <div class="bottom-tagline">Not one size fits all</div>
  </div>
</body>
</html>
