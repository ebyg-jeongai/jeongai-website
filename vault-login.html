<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Sign In — Jeong AI Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    :root {
      --primary: #0a4f8a;
      --primary-dark: #083d6b;
      --primary-light: #1a6fb8;
      --accent: #c7553b;
      --dark: #1a1a2e;
      --text: #3a3a4a;
      --text-light: #6b6b7b;
      --white: #ffffff;
      --border: #e2e4e8;
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --radius: 6px;
      --radius-lg: 12px;
      --transition: 0.25s ease;
      --font-heading: 'Montserrat', sans-serif;
      --font-body: 'Source Sans 3', 'Source Sans Pro', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-container {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-brand {
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 600;
      color: var(--primary-light);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .login-lock {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.25rem;
      background: rgba(10, 79, 138, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-lock svg { color: var(--primary-light); }
    h1 {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.5rem;
    }
    .login-sub {
      color: rgba(255,255,255,0.5);
      font-size: 15px;
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    .auth-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .auth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      padding: 0.85rem 1.25rem;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      transition: all var(--transition);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .auth-btn.microsoft {
      background: #2F2F2F;
      color: var(--white);
    }
    .auth-btn.microsoft:hover {
      background: #404040;
      color: var(--white);
    }
    .auth-btn.github {
      background: #24292e;
      color: var(--white);
    }
    .auth-btn.github:hover {
      background: #2f363d;
      color: var(--white);
    }
    .auth-btn.google {
      background: var(--white);
      color: var(--text);
      border-color: var(--border);
    }
    .auth-btn.google:hover {
      background: #f5f5f5;
      color: var(--text);
    }
    .auth-btn svg {
      flex-shrink: 0;
    }
    .login-footer {
      margin-top: 2rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .login-footer a {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-decoration: none;
      transition: color var(--transition);
    }
    .login-footer a:hover {
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-brand">Jeong AI</div>

    <div class="login-lock">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>

    <h1>Document Vault</h1>
    <p class="login-sub">Sign in to access secure documents and resources.</p>

    <div class="auth-buttons">
      <a href="/.auth/login/aad?post_login_redirect_uri=/vault" class="auth-btn microsoft">
        <svg width="20" height="20" viewBox="0 0 20 20"><rect x="1" y="1" width="8.5" height="8.5" fill="#F25022"/><rect x="10.5" y="1" width="8.5" height="8.5" fill="#7FBA00"/><rect x="1" y="10.5" width="8.5" height="8.5" fill="#00A4EF"/><rect x="10.5" y="10.5" width="8.5" height="8.5" fill="#FFB900"/></svg>
        Sign in with Microsoft
      </a>
      <a href="/.auth/login/github?post_login_redirect_uri=/vault" class="auth-btn github">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M10 0C4.477 0 0 4.484 0 10.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0110 4.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.203 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0020 10.017C20 4.484 15.522 0 10 0z"/></svg>
        Sign in with GitHub
      </a>
      <a href="/.auth/login/google?post_login_redirect_uri=/vault" class="auth-btn google">
        <svg width="20" height="20" viewBox="0 0 20 20"><path d="M19.6 10.23c0-.68-.06-1.36-.18-2.02H10v3.83h5.38a4.6 4.6 0 01-2 3.02v2.5h3.24c1.89-1.74 2.98-4.3 2.98-7.33z" fill="#4285F4"/><path d="M10 20c2.7 0 4.96-.9 6.62-2.44l-3.24-2.5c-.9.6-2.04.95-3.38.95-2.6 0-4.8-1.76-5.58-4.12H1.08v2.58A9.99 9.99 0 0010 20z" fill="#34A853"/><path d="M4.42 11.89A6.01 6.01 0 014.1 10c0-.66.11-1.3.32-1.89V5.53H1.08A9.99 9.99 0 000 10c0 1.61.39 3.14 1.08 4.47l3.34-2.58z" fill="#FBBC05"/><path d="M10 3.96c1.47 0 2.78.5 3.82 1.5l2.86-2.86C14.96.99 12.7 0 10 0 6.09 0 2.71 2.24 1.08 5.53l3.34 2.58C5.2 5.72 7.4 3.96 10 3.96z" fill="#EA4335"/></svg>
        Sign in with Google
      </a>
    </div>

    <div class="login-footer">
      <a href="/">&larr; Back to Jeong AI</a>
    </div>
  </div>

</body>
</html>
